# Cilium helm values — validated against the live soctalk cluster on
# 2026-05-11 after a multi-round debug session. See
# /wa/nix/mynix git log (commit 460440e and the preceding K3s commits)
# for the diagnostic story.
#
# Key design choices:
#
#   - kubeProxyReplacement: true requires the K3s server to run with
#     --disable-kube-proxy (see modules/k3s.nix extraFlags).
#
#   - k8sServiceHost = 127.0.0.1 because cilium-agent runs on hostNetwork
#     and reaches the API server via loopback. The cluster-IP for the
#     `kubernetes` service is programmed separately in Cilium's BPF
#     service map (kube-proxy replacement) so pods still get a working
#     10.43.0.1 endpoint.
#
#   - routingMode: native + ipv4NativeRoutingCIDR is the canonical
#     single-node setup. The previously tried `tunnel` (VXLAN) mode
#     silently dropped traffic on a single-node cluster because there
#     were no peers to tunnel to.
#
#   - bpf.masquerade: false because NixOS uses iptables-nft as the
#     iptables backend; BPF masquerade is flaky on this combo today.
#     enableIPv4Masquerade=true engages the regular iptables masquerade
#     path instead.
#
#   - endpointRoutes installs per-pod /32 routes on the host, which
#     keeps strict reverse-path-filtering setups working and avoids
#     cilium_host bridge complications.
#
#   - hubble is intentionally off. Flip to true and re-deploy when you
#     want flow visibility.

kubeProxyReplacement: true
k8sServiceHost: 127.0.0.1
k8sServicePort: 6443

operator:
  replicas: 1

routingMode: native
ipv4NativeRoutingCIDR: 10.42.0.0/24
autoDirectNodeRoutes: false

ipam:
  mode: kubernetes

cni:
  exclusive: true

bpf:
  masquerade: false
enableIPv4Masquerade: true

endpointRoutes:
  enabled: true

hubble:
  enabled: false
